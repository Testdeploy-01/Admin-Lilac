# Render deployment configuration
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: react-dashboard
    env: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
